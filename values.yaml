# Default values for livellm-proxy chart.

# ---------------------------------------------------------------------------
# Proxy deployment
# ---------------------------------------------------------------------------
replicaCount: 1
image:
  repository: kamasalyamov/livellm-proxy
  pullPolicy: Always
  tag: ""
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# Use an existing Secret for sensitive env vars (ENCRYPTION_SALT, REDIS_URL).
# When set, sensitive env vars are loaded from this Secret. Non-sensitive OTel
# config (OTEL_*, LOG_PROMPTS, DEFAULT_PROJECT) is still injected as direct env
# from the values below.
existingSecret: ""
# Environment variables — used to create the managed Secret when existingSecret
# is not set, and (for non-secret keys) injected directly into the deployment.
env:
  # Non-secret OTel config — injected as direct env vars regardless of existingSecret.
  otel_exporter_otlp_endpoint: ""
  otel_service_name: "livellm-proxy"
  otel_environment: ""
  # Whether to record prompt / completion text on spans (sensitive — default off).
  log_prompts: "false"
  # Fallback project name when a request omits the X-Project header.
  default_project: ""
  # Salt for Fernet encryption of provider data stored in Redis.
  # Must be the same value for both the proxy and the operator.
  # If not provided, data is stored as plain JSON.
  encryption_salt: ""
  # Override the auto-generated internal Redis URL.
  # Leave empty when redis.enabled=true — the URL is built automatically.
  # Set this when using an external Redis instance.
  redis_url: ""
  # Tiktoken safety overhead (default 1.20 = 20 % buffer).
  token_count_overhead: ""
  # MLflow tracing target. Leave empty when mlflow.enabled=true (the proxy is
  # auto-pointed at the bundled MLflow Service). Set this to an external MLflow
  # Tracking Server URI (e.g. http://mlflow.observability:5000) when running
  # MLflow outside this chart. Ignored when mlflow.enabled=true.
  mlflow_tracking_uri: ""
  # MLflow experiment name for traces (created if absent). Optional.
  mlflow_experiment_name: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
service:
  type: ClusterIP
  port: 8000
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
resources: {}
# Gates liveness/readiness until startup completes. failureThreshold*periodSeconds
# is the max startup budget (here 60*5s = 300s) before the pod is considered
# failed — generous enough for slow provider loading. Set to {} to disable.
startupProbe:
  httpGet:
    path: /ping
    port: http
  periodSeconds: 5
  failureThreshold: 60
  timeoutSeconds: 3
livenessProbe:
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
# ---------------------------------------------------------------------------
# Redis  (internal instance, deployed alongside the proxy)
# ---------------------------------------------------------------------------
redis:
  # Set to false to use an external Redis and supply redis_url in env above.
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    # Enable a PVC for Redis data — recommended for production.
    enabled: true
    size: 1Gi
# ---------------------------------------------------------------------------
# Operator
# ---------------------------------------------------------------------------
operator:
  enabled: true
  image:
    repository: kamasalyamov/livellm-proxy
    pullPolicy: Always
    tag: ""
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
# ---------------------------------------------------------------------------
# MLflow Tracking Server  (separate deployment for pydantic-ai tracing)
# When enabled, deploys an MLflow server (StatefulSet + Service + PVC) and
# auto-points the proxy's MLFLOW_TRACKING_URI at it. Disable to use an external
# MLflow server via env.mlflow_tracking_uri instead.
# ---------------------------------------------------------------------------
mlflow:
  enabled: false
  image:
    # Official MLflow image. Keep the tag aligned with the proxy's mlflow
    # client version (pyproject: mlflow>=3.12.0) to avoid trace API skew.
    repository: ghcr.io/mlflow/mlflow
    tag: "v3.12.0"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  service:
    type: ClusterIP
    port: 5000
  # MLflow 3.x validates the Host header (DNS-rebinding protection) and rejects
  # anything outside localhost + private IPs by default — which breaks the
  # ingress host, the proxy's service-DNS Host header and (depending on pod CIDR)
  # the health probe. Default allows all hosts; tighten to a comma-separated
  # list/wildcards e.g. "mlflow.vodovoz.internal,*.svc.cluster.local:5000".
  allowedHosts: "*"
  # Optional CORS origins (default mlflow: localhost). Same-origin UI needs none.
  corsAllowedOrigins: ""
  # Ingress for the MLflow UI. Host-based is recommended (MLflow serves its UI
  # at the host root). Same shape as the proxy `ingress` block above.
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: mlflow.chart-example.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  # Backend store + artifact root. Defaults live on the PVC mounted at
  # /mlflow/data; override for an external DB (e.g. postgresql://...).
  backendStoreUri: ""   # default: sqlite:////mlflow/data/mlflow.db
  artifactRoot: ""      # default: /mlflow/data/artifacts
  # MLflow defaults to 4 uvicorn workers; each loads the full mlflow server
  # (~0.5-1Gi resident), so 2 workers OOMKilled even at 1Gi. A tracing backend
  # has low concurrency and async writes, so a single worker is plenty.
  workers: 1
  resources:
    limits:
      cpu: 500m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 1Gi
  persistence:
    # Recommended for production so traces survive restarts. When false an
    # emptyDir is used and data is lost on pod restart.
    enabled: true
    size: 5Gi
    storageClass: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
