{{- if .Values.mlflow.enabled }}
# ---------------------------------------------------------------------------
# MLflow Tracking Server — separate deployment.
# The proxy ships pydantic-ai traces here when MLFLOW_TRACKING_URI is set
# (wired automatically in the proxy Deployment to this Service). Runs as its
# own StatefulSet with a PVC so the sqlite backend store + artifacts survive
# restarts. This is intentionally NOT embedded in the proxy process.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "chart.fullname" . }}-mlflow
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  serviceName: {{ include "chart.fullname" . }}-mlflow
  replicas: 1
  selector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mlflow
  template:
    metadata:
      labels:
        {{- include "chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mlflow
    spec:
      {{- with .Values.mlflow.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          command: ["mlflow"]
          args:
            - server
            - --host=0.0.0.0
            - --port={{ .Values.mlflow.service.port }}
            - --backend-store-uri={{ .Values.mlflow.backendStoreUri | default "sqlite:////mlflow/data/mlflow.db" }}
            - --artifacts-destination={{ .Values.mlflow.artifactRoot | default "/mlflow/data/artifacts" }}
            - --serve-artifacts
          ports:
            - name: http
              containerPort: {{ .Values.mlflow.service.port }}
              protocol: TCP
          {{- with .Values.mlflow.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /mlflow/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      {{- with .Values.mlflow.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlflow.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlflow.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.mlflow.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.mlflow.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.mlflow.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mlflow.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-mlflow
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  type: {{ .Values.mlflow.service.type }}
  ports:
    - name: http
      port: {{ .Values.mlflow.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
{{- if .Values.mlflow.ingress.enabled }}
---
# Ingress for the MLflow UI. Host-based is recommended: MLflow's UI fetches
# absolute (/ajax-api/...) paths, so serving it at a host root is the reliable
# option. A path-prefix setup needs MLflow's --static-prefix plus a stripprefix
# middleware and is version-fragile — prefer a dedicated host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "chart.fullname" . }}-mlflow
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
  {{- with .Values.mlflow.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.mlflow.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.mlflow.ingress.tls }}
  tls:
    {{- range .Values.mlflow.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.mlflow.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "chart.fullname" $ }}-mlflow
                port:
                  number: {{ $.Values.mlflow.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
