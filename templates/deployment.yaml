apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "chart.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chart.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                {{- if .Values.existingSecret }}
                name: {{ .Values.existingSecret }}
                {{- else }}
                name: {{ include "chart.fullname" . }}-env
                {{- end }}
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "{{ .Values.service.port }}"
            {{- if and .Values.redis.enabled .Values.existingSecret (not ((.Values.env).redis_url)) }}
            # existingSecret is in use and does not carry REDIS_URL, so we inject
            # the internal Redis service URL directly.  Direct env entries take
            # precedence over envFrom, so this safely overrides nothing.
            - name: REDIS_URL
              value: "redis://{{ include "chart.fullname" . }}-redis:6379/0"
            {{- end }}
            {{- /* Non-secret OTel / project knobs — always injected directly so
                   they are applied even when an existingSecret is in use. */}}
            {{- if (.Values.env).otel_exporter_otlp_endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otel_exporter_otlp_endpoint | quote }}
            {{- end }}
            {{- if (.Values.env).otel_service_name }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.env.otel_service_name | quote }}
            {{- end }}
            {{- if (.Values.env).otel_environment }}
            - name: OTEL_ENVIRONMENT
              value: {{ .Values.env.otel_environment | quote }}
            {{- end }}
            {{- if (.Values.env).log_prompts }}
            - name: LOG_PROMPTS
              value: {{ .Values.env.log_prompts | quote }}
            {{- end }}
            {{- if (.Values.env).default_project }}
            - name: DEFAULT_PROJECT
              value: {{ .Values.env.default_project | quote }}
            {{- end }}
            {{- /* MLflow tracing target. When the bundled MLflow deployment is
                   enabled, point the proxy at its in-cluster Service; otherwise
                   honour an explicit env.mlflow_tracking_uri (e.g. external server). */}}
            {{- if .Values.mlflow.enabled }}
            - name: MLFLOW_TRACKING_URI
              value: "http://{{ include "chart.fullname" . }}-mlflow:{{ .Values.mlflow.service.port }}"
            {{- else if (.Values.env).mlflow_tracking_uri }}
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.env.mlflow_tracking_uri | quote }}
            {{- end }}
            {{- if or .Values.mlflow.enabled (.Values.env).mlflow_tracking_uri }}
            # Per-process isolated trace-id generator. Without this, multiple
            # proxy replicas can generate colliding trace-ids -> Postgres
            # duplicate-key (trace_info_pk) write conflicts.
            - name: MLFLOW_TRACE_USE_ISOLATED_RANDOM_ID_GENERATOR
              value: "true"
            {{- end }}
            {{- if (.Values.env).mlflow_trace_sampling_ratio }}
            # Fraction of traces to record (0..1). The voice pipeline emits a
            # high volume of TTS/ASR spans; sampling keeps the trace backend
            # from being overwhelmed.
            - name: MLFLOW_TRACE_SAMPLING_RATIO
              value: {{ .Values.env.mlflow_trace_sampling_ratio | quote }}
            {{- end }}
            {{- if (.Values.env).mlflow_experiment_name }}
            - name: MLFLOW_EXPERIMENT_NAME
              value: {{ .Values.env.mlflow_experiment_name | quote }}
            {{- end }}
          {{- with .Values.startupProbe }}
          # Gates liveness/readiness until the app has finished its (slow)
          # startup — loading providers from Redis can take a while, and without
          # this the aggressive liveness /ping kills the pod mid-boot (restart
          # loop on every rollout).
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
